<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Fotografía</title>

    <link rel="stylesheet"
          href="css/styles.css">

</head>

<body>

    <header class="photo-header">

        <a href="index.html" class="back-link">
            ← Volver a la galería
        </a>

    </header>

    <main class="photo-container">

        <img
            id="photo-image"
            src=""
            alt="Fotografía de la exposición">

        <h1 id="photo-title"></h1>

        <section class="history">

            <h2>Historia</h2>

            <p id="photo-history"></p>

        </section>

        <section class="metadata">

            <p>
                <strong>Autor:</strong>
                <span id="photo-author"></span>
            </p>

            <p>
                <strong>Lugar:</strong>
                <span id="photo-place"></span>
            </p>

            <p>
                <strong>Fecha:</strong>
                <span id="photo-date"></span>
            </p>

        </section>

    </main>

    <nav class="navigation">

        <a id="previous-photo" href="#">
            ◀ Anterior
        </a>

        <a href="index.html">
            🏠 Inicio
        </a>

        <a id="next-photo" href="#">
            Siguiente ▶
        </a>

    </nav>

    <script src="js/photos.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
